<?xml version="1.0" encoding="UTF-8"?>
<!--
  lockup-regent-dark.svg — "regent by .stbl" lockup (dark surface)

  Mirror of lockup-regent.svg with #fff foreground. For OG cards,
  --version banner, and any dark-surface use of the lockup.

  Lockup pattern: ProductName + "by" + .stbl mark (inverted) + "stbl"
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160"
     role="img" aria-label="regent by .stbl">
  <title>regent by .stbl</title>
  <text x="0" y="105"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="100"
        font-weight="700"
        fill="#fff"
        letter-spacing="-4">regent</text>
  <text x="350" y="105"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="48"
        font-weight="400"
        fill="#888"
        letter-spacing="-1">by</text>
  <rect x="430" y="73" width="32" height="32" fill="#fff"/>
  <text x="472" y="105"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="100"
        font-weight="700"
        fill="#fff"
        letter-spacing="-3">stbl</text>
</svg>