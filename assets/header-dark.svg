<?xml version="1.0" encoding="UTF-8"?>
<!-- header-dark.svg — full-size regent banner (dark surface)
     Hero: large regent mark + "regent" wordmark, JetBrains Mono.
     Subordinate: "by .stbl" small block in upper-right corner. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200"
     font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <g fill="#fff">
    <!-- Hero: regent mark + wordmark -->
    <g transform="translate(80, 50)">
      <!-- Mark: 3 regalia bars + base + 1px glitch slice (scaled 3x to ~96x96) -->
      <g transform="scale(3)">
        <rect x="6"  y="10" width="4" height="18"/>
        <rect x="14" y="4"  width="4" height="24"/>
        <rect x="22" y="10" width="4" height="18"/>
        <rect x="6"  y="28" width="20" height="2"/>
        <rect x="13" y="20" width="6" height="1" opacity="0.35"/>
      </g>
      <!-- "regent" wordmark -->
      <text x="320" y="92" font-size="92" font-weight="700" letter-spacing="-3">regent</text>
    </g>

    <!-- Subordinate: "by .stbl" small block, top-right corner, dimmed -->
    <g transform="translate(1100, 30)" opacity="0.55">
      <text x="0" y="0" font-size="11" font-weight="400" letter-spacing="0.5">by</text>
      <text x="0" y="24" font-size="24" font-weight="700" letter-spacing="-0.5">.stbl</text>
    </g>
  </g>
</svg>
