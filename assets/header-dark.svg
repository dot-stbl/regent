<?xml version="1.0" encoding="UTF-8"?>
<!-- header-dark.svg — compact regent lockup (dark surface)
     Mark: abstracted regalia (3 vertical bars + base) + glitch slice.
     Lockup: "regent ● by .stbl", JetBrains Mono, 280x48.
     Edge-anchored in README via <p align="right">. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48"
     font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <g fill="#fff">
    <!-- "regent" wordmark -->
    <text x="0" y="32" font-size="28" font-weight="700" letter-spacing="-1">regent</text>
    <!-- separator (dimmed) -->
    <text x="120" y="32" font-size="14" font-weight="400" fill="#fff" opacity="0.5">by</text>
    <!-- regent mark: 3 regalia bars + base + 1px glitch slice -->
    <g transform="translate(146, 8)">
      <rect x="6"  y="10" width="4" height="18"/>
      <rect x="14" y="4"  width="4" height="24"/>
      <rect x="22" y="10" width="4" height="18"/>
      <rect x="6"  y="28" width="20" height="2"/>
      <rect x="13" y="20" width="6" height="1" opacity="0.35"/>
    </g>
    <!-- ".stbl" wordmark -->
    <text x="190" y="32" font-size="24" font-weight="700" letter-spacing="-1">stbl</text>
  </g>
</svg>
