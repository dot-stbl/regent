<?xml version="1.0" encoding="UTF-8"?>
<!-- header-light.svg — full-size regent banner (light surface)
     Hero: regent mark (3 abstract thin bars + accent glitch slice) +
           "regent" wordmark in JetBrains Mono.
     Background: subtle dot-grid pattern (6% black, 16px tile).
     Subordinate: "by .stbl" small block in upper-right corner, dimmed. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200"
     font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.6" fill="#000" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background: white + dot grid -->
  <rect width="1200" height="200" fill="#fff"/>
  <rect width="1200" height="200" fill="url(#dots)"/>

  <g fill="#000">
    <!-- Hero: regent mark + wordmark -->
    <g transform="translate(80, 50)">
      <!-- Mark (more abstract: thin vertical strokes, not solid bars) -->
      <g transform="scale(3)">
        <rect x="8"  y="8" width="2" height="20"/>
        <rect x="15" y="4" width="2" height="24"/>
        <rect x="22" y="8" width="2" height="20"/>
        <!-- Glitch slice: 1px horizontal accent across all 3 bars -->
        <rect x="6" y="20" width="20" height="1" fill="#c44569" opacity="0.7"/>
      </g>
      <!-- "regent" wordmark -->
      <text x="320" y="92" font-size="92" font-weight="700" letter-spacing="-3">regent</text>
    </g>

    <!-- Subordinate: "by .stbl" small block, top-right corner, dimmed -->
    <g transform="translate(1100, 30)" opacity="0.55">
      <text x="0" y="0" font-size="11" font-weight="400" letter-spacing="0.5">by</text>
      <text x="0" y="24" font-size="24" font-weight="700" letter-spacing="-0.5">.stbl</text>
    </g>
  </g>
</svg>
