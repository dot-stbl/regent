<?xml version="1.0" encoding="UTF-8"?>
<!-- header-light.svg — regent banner (light surface)

     Mirror of header-dark.svg with #000 foreground. Same lockup
     structure, same opacity hierarchy, same skvoznoy accent line.

     "by .stbl" lockup follows the .stbl brand spec — see
     assets/stbl/assets/lockup-template.svg for the canonical pattern. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200"
     font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace">

  <defs>
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.6" fill="#000" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Ambient: white surface + dot grid (opacity 0.07) -->
  <rect width="1200" height="200" fill="#fff"/>
  <rect width="1200" height="200" fill="url(#dots)"/>

  <!-- Lockup — one visual block -->

  <!-- Regent mark: 3 vertical strokes (subordinate opacity 0.75) -->
  <rect x="80"  y="75" width="3" height="70" fill="#000" opacity="0.75"/>
  <rect x="93"  y="75" width="3" height="70" fill="#000" opacity="0.75"/>
  <rect x="106" y="75" width="3" height="70" fill="#000" opacity="0.75"/>

  <!-- Wordmark: "regent" (primary opacity 1.0) -->
  <text x="140" y="132" font-size="92" font-weight="700" letter-spacing="-3"
        fill="#000" opacity="1.0">regent</text>

  <!-- Canonical "by .stbl" lockup (per assets/stbl/assets/lockup-template.svg) -->
  <!-- "by" connector — brand spec fill #888, weight 400 -->
  <text x="475" y="132" font-size="28" font-weight="400" letter-spacing="-0.5"
        fill="#888">by</text>

  <!-- .stbl mark — 16×16 in header context (32×32 in standalone lockup-regent.svg) -->
  <rect x="503" y="116" width="16" height="16" fill="#000"/>

  <!-- "stbl" wordmark (secondary opacity 0.85) -->
  <text x="525" y="132" font-size="28" font-weight="700" letter-spacing="-0.5"
        fill="#000" opacity="0.85">stbl</text>

  <!-- Skvoznoy accent line: spans canvas, ties mark+wordmark+lockup into one block -->
  <rect x="80" y="158" width="1040" height="1.5" fill="#c44569" opacity="0.65"/>
</svg>