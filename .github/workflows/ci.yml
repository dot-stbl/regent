name: ci

# Both test and benchmark jobs run on every push and pull request.
on:
  push:
  pull_request:

permissions:
  contents: read

env:
  BUN_VERSION: '1.3'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Use the package's Vitest script so local and CI runs share vitest.config.ts.
      - name: Test
        run: bun run test

      - name: Smoke
        run: node dist/cli.js check --help

  # Benchmark gate. The benchmark module establishes a baseline on the
  # first run (writes .regent/baseline.json, baselineDeltaPct = null) and
  # compares against it on later runs. The checkout never contains the
  # baseline, so it is persisted across runs via actions/cache. The gate
  # fails only on a real median regression of more than 50%. This
  # conservative threshold can be tightened after more CI data points.
  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Carry the baseline forward across runs. A fresh unique key is
      # written each run; restore-keys grabs the most recent prior one.
      - name: Restore benchmark baseline
        uses: actions/cache/restore@v6
        with:
          path: .regent/baseline.json
          key: regent-bench-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            regent-bench-${{ runner.os }}-

      - name: Run benchmark
        id: bench
        # 200 files × 30 rules × 3 iterations — moderate workload, fast
        # enough for CI, sensitive enough to catch real regressions.
        run: |
          RESULT=$(node dist/cli.js benchmark --files 200 --rules 30 --iterations 3)
          echo "$RESULT"
          DELTA=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin).get('baselineDeltaPct'); print('' if d is None else d)")
          if [ -z "$DELTA" ]; then
            echo "No baseline yet — established one; regression gate skipped this run."
          elif awk "BEGIN { exit !($DELTA > 50) }"; then
            echo "::error::benchmark regressed by ${DELTA}% (budget: 50%)"
            exit 1
          else
            echo "benchmark median delta ${DELTA}% (within 50% budget)"
          fi

      - name: Save benchmark baseline
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .regent/baseline.json
          key: regent-bench-${{ runner.os }}-${{ github.run_id }}

      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result
          path: .regent/baseline.json
          if-no-files-found: ignore

