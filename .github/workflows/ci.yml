name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  BUN_VERSION: '1.3'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Smoke
        run: node dist/cli.js check --help

  # Phase 14: benchmark gate. Establishes a baseline on first run
  # (the benchmark module writes .regent/baseline.json); subsequent
  # runs fail when median latency regresses by more than 50%.
  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run benchmark
        id: bench
        # 200 files × 30 rules × 3 iterations — moderate workload, fast
        # enough for CI (~5-10s on ubuntu-latest), sensitive enough
        # to catch real regressions.
        run: |
          RESULT=$(node dist/cli.js benchmark \
            --files 200 --rules 30 --iterations 3)
          echo "$RESULT"
          # Fail if median regresses by more than 50% vs the
          # committed baseline. The benchmark module writes a fresh
          # baseline on first run; subsequent runs compare.
          DELTA=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin).get('baselineDeltaPct'); print('inf' if d is None else d)")
          if [ "$DELTA" = "inf" ] || [ "$(echo "$DELTA > 50" | bc -l)" = "1" ]; then
            echo "::error::benchmark regressed: ${DELTA}%"
            exit 1
          fi

      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result
          path: .regent/baseline.json
          if-no-files-found: ignore

