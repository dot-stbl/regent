name: release

# Publishes @dot-stbl/regent to GitHub Packages on a `v*` tag push,
# then creates a GitHub Release with auto-generated notes.
#
# Visibility: GitHub Packages defaults to PRIVATE on first publish. After
# the first successful run, go to
# https://github.com/orgs/dot-stbl/packages/npm/regent/settings and
# change package visibility to PUBLIC.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # tag push + GitHub Release creation
  packages: write   # publish to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive   # assets/stbl submodule contents in tarball

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build + test + lint gate
        run: |
          bun run typecheck
          bun run lint
          bun test
          bun run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun publish --release ${{ steps.version.outputs.version }} --registry https://npm.pkg.github.com

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}