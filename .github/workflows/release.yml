name: release

# Publishes @dot-stbl/regent to npmjs.com on a `v*` tag push,
# then creates a GitHub Release with auto-generated notes.
#
# Requires: GitHub Environment "npm-publish" with NPM_TOKEN secret
# (Settings → Environments → npm-publish → Secrets).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # tag push + GitHub Release creation

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Build + test + lint gate
        run: |
          bun run typecheck
          bun run lint
          bun test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Auth: NPM_TOKEN comes from environment "npm-publish" secrets.
      # We write .npmrc at the repo root because npm ignores .npmrc
      # inside workspace packages and `npm config set` refuses to
      # run inside workspaces.
      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          REGISTRY_HOST=$(echo "$REGISTRY" | sed -E 's|^https?://||' | sed 's|/$||')
          TOKEN=$(echo -n "$NPM_TOKEN" | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set!"
            exit 1
          fi
          printf "registry=%s\n//%s/:_authToken=%s\n" "$REGISTRY" "$REGISTRY_HOST" "$TOKEN" > .npmrc
          chmod 600 .npmrc
          echo "--- .npmrc (token masked) ---"
          sed 's/_authToken=.*/_authToken=***MASKED***/' .npmrc

      - name: Publish to npmjs.com
        run: |
          REGISTRY=$(node -p "require('./package.json').publishConfig.registry")
          echo "Publishing @dot-stbl/regent@${{ steps.version.outputs.version }} → $REGISTRY"
          npm publish --access public

      - name: Cleanup .npmrc
        if: always()
        run: rm -f .npmrc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
